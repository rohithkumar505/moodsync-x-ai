server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Required for getUserMedia when served over HTTPS (reverse proxy / TLS terminator).
    add_header Permissions-Policy "camera=(self), microphone=()" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:5001;
    }

    location /uploads/ {
        proxy_pass http://backend:5001;
    }
}
