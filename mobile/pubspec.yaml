name: moodsync_mobile
description: MoodSync X AI — mood detection and music (Flutter)
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  shared_preferences: ^2.3.3
  go_router: ^14.6.2
  provider: ^6.1.2
  just_audio: ^0.9.42
  cached_network_image: ^3.4.1
  camera: ^0.11.0+2
  google_mlkit_face_detection: ^0.12.0
  permission_handler: ^11.3.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#302b63"
  adaptive_icon_foreground: assets/icon/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
