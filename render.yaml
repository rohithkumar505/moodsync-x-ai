# Deploy backend + Postgres on Render (free tier).
# 1. Push repo to GitHub
# 2. https://dashboard.render.com → New → Blueprint → connect repo
# 3. After deploy, copy the backend URL into Vercel as VITE_API_URL
# 4. Set CORS_ORIGINS on Render to your Vercel URL (comma-separated)

services:
  - type: web
    name: moodsync-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:application --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "0"
      - key: SKIP_MUSIC_DOWNLOAD
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: moodsync-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: moodsync-db
    plan: free
    databaseName: moodsync
    user: moodsync
